<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - General Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="sidebar">
        <div class="brand">
            <i class="bi bi-briefcase-fill text-primary"></i> VMS Corp
        </div>
        <div class="sidebar-heading">Executive</div>
        <ul class="sidebar-menu">
            <li class="active"><a href="general-manager.html"><i class="bi bi-pie-chart-fill"></i> Exec Dash</a></li>
            <li><a href="../analytics/vehicle-health.html"><i class="bi bi-graph-up"></i> Reports</a></li>
            <li><a href="#"><i class="bi bi-building"></i> Branches</a></li>
            <li><a href="#"><i class="bi bi-gear"></i> Settings</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold d-none d-md-block">General Manager Dashboard</h5>
            </div>
            <div class="d-flex align-items-center gap-3 ms-auto justify-content-end">
                <button id="themeSwitch" class="btn btn-outline-primary rounded-circle"><i
                        class="bi bi-moon-stars"></i></button>
                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle user-profile"
                        data-bs-toggle="dropdown">
                        <img src="https://ui-avatars.com/api/?name=Gen+Manager&background=2b2d42&color=fff" alt="User">
                        <span class="ms-2 d-none d-md-inline text-body fw-semibold">G. Manager</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="min-width: 200px;">
                        <li><a class="dropdown-item py-2" href="../client/profile.html"><i
                                    class="bi bi-person me-2 text-primary"></i> View Profile</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item py-2 text-danger" href="../auth/login.html"><i
                                    class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <div class="container-fluid p-4 fade-in">
            <!-- KPIs -->
            <div class="row g-4 mb-4">
                <div class="col-12 col-sm-6 col-xl-3">
                    <div class="card border-0 shadow-sm rounded-4 hover-zoom h-100 p-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <p class="text-muted mb-1 text-uppercase fw-semibold" style="font-size:0.8rem;">YTD
                                    Revenue</p>
                                <h3 class="fw-bold mb-0">$1.2M</h3>
                                <small class="text-success"><i class="bi bi-arrow-up-short"></i> 15% YoY</small>
                            </div>
                            <div class="bg-primary bg-opacity-10 p-3 rounded-circle">
                                <i class="bi bi-cash-stack text-primary fs-3"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Other KPI cards can go here, omitted for brevity but looks realistic -->
            </div>
            <!-- Content here -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body text-center p-5">
                    <i class="bi bi-pie-chart text-muted display-1"></i>
                    <h4 class="mt-3">Executive Overview</h4>
                    <p class="text-muted">High-level enterprise reports and staff management tools would go here.</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
