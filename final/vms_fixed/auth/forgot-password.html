
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMS - Forgot Password</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login-style.css">

  <style>
    body.auth-bg {
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.72)),
        url("../garage.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 12px;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: -80px;
      pointer-events: none;
      background:
        radial-gradient(900px 520px at 20% 20%, rgba(67,97,238,.25), transparent 60%),
        radial-gradient(700px 420px at 80% 30%, rgba(247,37,133,.20), transparent 55%),
        radial-gradient(700px 420px at 40% 90%, rgba(114,9,183,.14), transparent 55%);
      z-index: 0;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      overflow: hidden;
    }

    .login-card .card-body {
      padding: 28px 28px 22px 28px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      font-weight: 700;
      background: rgba(67,97,238,.18);
      border: 1px solid rgba(67,97,238,.35);
    }

    .title { color:#fff; font-weight: 800; margin: 10px 0 6px 0; }
    .subtitle { color: rgba(255,255,255,.78); margin-bottom: 0; }

    .divider {
      height: 1px;
      background: rgba(255,255,255,.14);
      margin: 18px 0;
    }

    .form-label { color: rgba(255,255,255,.86); font-weight: 600; }
    .form-control {
      background: rgba(15,23,42,.38);
      border: 1px solid rgba(255,255,255,.18);
      color: #fff;
      border-radius: 14px;
      padding: 12px 14px;
    }
    .form-control::placeholder { color: rgba(255,255,255,.55); }
    .form-control:focus {
      border-color: rgba(67,97,238,.75);
      box-shadow: 0 0 0 .25rem rgba(67,97,238,.22);
      background: rgba(15,23,42,.48);
      color: #fff;
    }

    .btn-wide {
      width: 100%;
      border-radius: 16px;
      padding: 12px 14px;
      font-weight: 800;
      letter-spacing: .2px;
    }

    .small-muted {
      color: rgba(255,255,255,.72);
      font-size: .95rem;
      margin-top: 14px;
      text-align: center;
    }
    .small-muted a {
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
    .small-muted a:hover { text-decoration: underline; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: #fff;
      text-decoration: none;
      transition: transform .15s ease, background-color .15s ease;
    }
    .back-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,.12); }
  </style>
</head>

<body class="auth-bg">

  <div class="bg-glow"></div>

  <div class="card login-card">
    <div class="card-body">
      <div class="brand-row">
        <span class="brand-pill"><i class="bi bi-car-front-fill"></i> VMS Portal</span>
        <a class="back-btn" href="login.html" aria-label="Back to Login">
          <i class="bi bi-arrow-left"></i>
        </a>
      </div>

      <h2 class="title">Forgot Password</h2>
      <p class="subtitle">Enter your email to receive password reset instructions.</p>

      <div class="divider"></div>

      <form>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary btn-wide">
          Send Reset Link
        </button>

        <div class="small-muted">
          Remember your password? <a href="login.html">Login</a>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
