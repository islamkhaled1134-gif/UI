<!DOCTYPE html>
<html lang="en">

<head>

    <title>VMS - Work Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">

<body data-role="technician" class="vms-app">
    <nav class="sidebar">
        <div class="brand"><i class="bi bi-tools text-primary"></i> VMS Tech</div>
        <div class="sidebar-heading">Workflow</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/technician.html">Dashboard</a></li>
            <li class="active"><a href="work-orders.html"><i class="bi bi-card-checklist"></i> Work Orders</a></li>
            <li><a href="parts-request.html"><i class="bi bi-box-seam"></i> Parts Request</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3">Work Orders</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-transparent pt-4 pb-0 border-0 d-flex justify-content-between">
                    <h5 class="fw-bold">All Work Orders</h5>
                    <div class="input-group w-auto">
                        <input type="text" class="form-control form-control-sm" placeholder="Search WO..." id="woSearch">
                        <button class="btn btn-primary btn-sm"><i class="bi bi-search"></i></button>
                    </div>
                </div>
                <div class="card-body">
                    <table id="workOrdersTable" class="table table-hover align-middle mt-3">
                        <thead class="table-light">
                            <tr>
                                <th>Work Order</th>
                                <th>Vehicle</th>
                                <th>Service Type</th>
                                
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>2019 Toyota Camry</td>
                                <td>Engine Diagnostics</td>
                                
                                
                                <td><a href="work-order-details.html" class="btn btn-sm btn-outline-primary">Open</a>
                                </td>
                            </tr>
                            <tr>
                                <td>2</td>
                                <td>2021 Ford Bronco</td>
                                <td>Brake Pad Rep.</td>
                                
                                
                                <td><a href="work-order-details.html" class="btn btn-sm btn-outline-primary">Open</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
