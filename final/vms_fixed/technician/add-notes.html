<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Add Tech Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="sidebar">
        <!-- Sidebar logic -->
        <div class="brand"><i class="bi bi-tools text-primary"></i> VMS Tech</div>
        <div class="sidebar-heading">Workflow</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/technician.html">Dashboard</a></li>
            <li class="active"><a href="work-orders.html"><i class="bi bi-card-checklist"></i> Work Orders</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3 d-flex align-items-center">
                <a href="work-order-details.html" class="text-decoration-none text-muted me-3"><i
                        class="bi bi-arrow-left"></i></a>
                Add Notes (WO-4592)
            </h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="col-lg-6 mx-auto">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Detailed Technician Notes</h5>
                        <form action="work-order-details.html">
                            <div class="mb-3">
                                <label class="form-label">Diagnostic Findings / Work Performed</label>
                                <textarea class="form-control form-control-lg" rows="6"
                                    placeholder="Document the steps taken..." required></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Attach Image (Optional)</label>
                                <input type="file" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Save Note</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
