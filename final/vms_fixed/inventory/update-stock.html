<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Update Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body data-role="inventory" class="vms-app">
    <nav class="sidebar">
        <!-- Sidebar logic -->
        <div class="brand"><i class="bi bi-box-seam-fill text-primary"></i> VMS Inventory</div>
        <div class="sidebar-heading">Inventory</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/stock-keeper.html"><i class="bi bi-inboxes-fill"></i> Dashboard</a></li>
            <li><a href="stock-list.html"><i class="bi bi-list-ul"></i> Stock List</a></li>
            <li class="active"><a href="update-stock.html"><i class="bi bi-arrow-repeat"></i> Update Stock</a></li>
            <li><a href="low-stock.html"><i class="bi bi-exclamation-triangle"></i> Low Stock Alerts</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3">Receive / Adjust Inventory</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="col-lg-8 mx-auto">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-arrow-repeat text-primary display-4"></i>
                            <h4 class="fw-bold mt-2">Stock Entry Form</h4>
                            <p class="text-muted">Register newly arrived items or adjust discrepancies</p>
                        </div>
                        <form action="stock-list.html">
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Search / Select SKU</label>
                                    <input type="text" list="sku-list" class="form-control form-control-lg"
                                        placeholder="Start typing SKU..." required>
                                    <datalist id="sku-list">
                                        <option value="BP-1002 - Brake Pads">
                                        <option value="OIL-5W30 - Synthetic Oil">
                                        <option value="SP-102 - Spark Plugs">
                                    </datalist>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Transaction Type</label>
                                    <select class="form-select form-select-lg" required>
                                        <option value="receive">Receive (Add to stock)</option>
                                        <option value="adjust_down">Adjustment (Decrease)</option>
                                        <option value="return">Return to Supplier</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label">Quantity</label>
                                    <input type="number" class="form-control form-control-lg" min="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Supplier / Note</label>
                                    <input type="text" class="form-control form-control-lg"
                                        placeholder="AutoParts Co / Damage adjust">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Save
                                Transaction</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
