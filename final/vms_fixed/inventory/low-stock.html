<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Low Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="sidebar">
        <div class="brand"><i class="bi bi-box-seam-fill text-primary"></i> VMS Inventory</div>
        <div class="sidebar-heading">Inventory</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/stock-keeper.html"><i class="bi bi-inboxes-fill"></i> Dashboard</a></li>
            <li><a href="stock-list.html"><i class="bi bi-list-ul"></i> Stock List</a></li>
            <li><a href="update-stock.html"><i class="bi bi-arrow-repeat"></i> Update Stock</a></li>
            <li class="active"><a href="low-stock.html"><i class="bi bi-exclamation-triangle-fill"></i> Low Stock
                    Alerts</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3 d-flex align-items-center">
                <i class="bi bi-circle-fill text-danger fs-6 me-2 blink-anim"></i> Action Required
            </h5>
        </header>
        <div class="container p-4 fade-in">
            <style>
                .blink-anim {
                    animation: blinker 1.5s linear infinite;
                }

                @keyframes blinker {
                    50% {
                        opacity: 0;
                    }
                }
            </style>
            <div class="card border-0 shadow-sm rounded-4 border-top border-danger border-4">
                <div
                    class="card-header bg-transparent pt-4 pb-0 border-0 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Critical Levels</h5>
                    <button class="btn btn-outline-danger btn-sm"><i class="bi bi-cart"></i> Generate Master PO</button>
                </div>
                <div class="card-body mt-3">
                    <div class="row g-4">
                        <!-- Alert Card 1 -->
                        <div class="col-md-6">
                            <div class="card border border-danger bg-danger bg-opacity-10 rounded-4">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <h6 class="fw-bold text-danger mb-1">Brake Pads (Front)</h6>
                                        <span class="badge bg-danger">Critical</span>
                                    </div>
                                    <p class="text-muted small mb-3">SKU: BP-1002 | Recommended: 15 Units</p>
                                    <div class="d-flex justify-content-between align-items-end">
                                        <h3 class="fw-bold mb-0 text-dark">2 <span
                                                class="fs-6 text-muted fw-normal">Units Left</span></h3>
                                        <button class="btn btn-primary btn-sm">Order Now</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- Alert Card 2 -->
                        <div class="col-md-6">
                            <div class="card border border-warning bg-warning bg-opacity-10 rounded-4">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between">
                                        <h6 class="fw-bold text-warning-emphasis mb-1">Wiper Fluid (Gallon)</h6>
                                        <span class="badge bg-warning text-dark">Warning</span>
                                    </div>
                                    <p class="text-muted small mb-3">SKU: WF-GAL01 | Recommended: 30 Gals</p>
                                    <div class="d-flex justify-content-between align-items-end">
                                        <h3 class="fw-bold mb-0 text-dark">8 <span
                                                class="fs-6 text-muted fw-normal">Gals Left</span></h3>
                                        <button class="btn btn-primary btn-sm">Order Now</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
