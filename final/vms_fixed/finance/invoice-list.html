<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Invoice List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body data-role="finance" class="vms-app">
    <nav class="sidebar">
        <!-- Sidebar logic -->
        <div class="brand"><i class="bi bi-cash-stack text-primary"></i> VMS Finance</div>
        <div class="sidebar-heading">Accounting</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/finance-manager.html"><i class="bi bi-wallet2"></i> Dashboard</a></li>
            <li class="active"><a href="invoice-list.html"><i class="bi bi-receipt"></i> Invoices</a></li>
            <li><a href="financial-report.html"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3">Invoice Management</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="card border-0 shadow-sm rounded-4">
                <div
                    class="card-header bg-transparent pt-4 pb-0 border-0 d-flex justify-content-between align-items-center">
                    <h6 class="fw-bold mb-0">All Invoices</h6>
                        Invoice</a>
                </div>
                <div class="card-body">
                    <div class="d-flex mb-3 gap-2">
                        <select class="form-select form-select-sm w-auto">
                            <option>All Statuses</option>
                            <option>Paid</option>
                            <option>Pending</option>
                        </select>
                        <input type="date" class="form-control form-control-sm w-auto">
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Inv #</th>
                                    <th>Client / Vehicle</th>
                                    <th>Date Issued</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><span class="fw-bold">INV-1004</span></td>
                                    <td>John Doe <br><small class="text-muted">Toyota Camry</small></td>
                                    <td>Oct 10, 2026</td>
                                    <td><span class="fw-bold">$450.00</span></td>
                                    <td><span class="badge bg-danger">Pending</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary" title="View"><i
                                                class="bi bi-eye"></i></button>
                                        <button class="btn btn-sm btn-outline-success" title="Mark Paid"><i
                                                class="bi bi-check2"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td><span class="fw-bold">INV-1003</span></td>
                                    <td>Sarah Smith <br><small class="text-muted">Ford Bronco</small></td>
                                    <td>Oct 08, 2026</td>
                                    <td><span class="fw-bold">$85.00</span></td>
                                    <td><span class="badge bg-success">Paid</span></td>
                                    <td>
                                        <button class="btn btn-sm btn-outline-primary" title="View"><i
                                                class="bi bi-eye"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
