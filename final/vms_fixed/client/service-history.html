<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Service History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body data-role="client" class="vms-app">
    <nav class="sidebar">
        <!-- Sidebar logic -->
        <div class="brand"><a href="../index.html" style="text-decoration:none;color:inherit;"><i class="bi bi-car-front-fill text-primary"></i> VMS Portal</a></div>
        <div class="sidebar-heading">My Menu</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/client.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li class="active"><a href="service-history.html"><i class="bi bi-clock-history"></i> Service History</a>
            </li>
            <li><a href="payment.html"><i class="bi bi-credit-card"></i> Payments</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3">Service History</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">Past Services</h5>
                        <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-download"></i> Export
                            All</button>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Vehicle</th>
                                    <th>Service Type</th>
                                    <th>Technician</th>
                                    <th>Cost</th>
                                    <th>Receipt</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Sept 15, 2026</td>
                                    <td>2021 Ford Bronco</td>
                                    <td>Oil Change & Filter</td>
                                    <td>Mike T.</td>
                                    <td><span class="fw-bold text-success">$85.00</span></td>
                                    <td><button class="btn btn-sm btn-outline-primary"><i
                                                class="bi bi-file-earmark-pdf"></i></button></td>
                                </tr>
                                <tr>
                                    <td>July 10, 2026</td>
                                    <td>2018 Honda Civic</td>
                                    <td>Brake Pads Replacement</td>
                                    <td>John D.</td>
                                    <td><span class="fw-bold text-success">$210.00</span></td>
                                    <td><button class="btn btn-sm btn-outline-primary"><i
                                                class="bi bi-file-earmark-pdf"></i></button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
