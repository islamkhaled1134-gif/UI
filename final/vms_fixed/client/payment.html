<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="vms-app" data-role="client">
    <nav class="sidebar">
        <!-- Sidebar logic -->
        <div class="brand"><a href="../index.html" style="text-decoration:none;color:inherit;"><i class="bi bi-car-front-fill text-primary"></i> VMS Portal</a></div>
        <div class="sidebar-heading">My Menu</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/client.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li class="active"><a href="payment.html"><i class="bi bi-credit-card-fill"></i> Payments</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3">Checkout Securely</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 p-md-5">
                            <h5 class="fw-bold mb-4">Payment Method</h5>

                            <!-- Payment Options -->
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <input type="radio" class="btn-check" name="paymethod" id="cc" checked>
                                    <label
                                        class="btn btn-outline-primary w-100 p-3 text-start d-flex align-items-center gap-3"
                                        for="cc">
                                        <i class="bi bi-credit-card fs-3"></i>
                                        <div>
                                            <span class="d-block fw-bold">Credit/Debit Card</span>
                                            <small class="text-muted">Visa, Mastercard, Amex</small>
                                        </div>
                                    </label>
                                </div>
                                <div class="col-md-6">
                                    <input type="radio" class="btn-check" name="paymethod" id="wallet">
                                    <label
                                        class="btn btn-outline-primary w-100 p-3 text-start d-flex align-items-center gap-3"
                                        for="wallet">
                                        <i class="bi bi-wallet2 fs-3"></i>
                                        <div>
                                            <span class="d-block fw-bold">Online Wallet</span>
                                            <small class="text-muted">Fast and secure checkout</small>
                                        </div>
                                    </label>
                                </div>
                            </div>

                            <!-- Card Form -->
                            <form id="paymentForm">
                                <div class="mb-3">
                                    <label class="form-label">Cardholder Name</label>
                                    <input type="text" class="form-control form-control-lg" placeholder="Jane Doe"
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Card Number</label>
                                    <div class="input-group">
                                        <input type="text" class="form-control form-control-lg"
                                            placeholder="0000 0000 0000 0000" required id="cardNumber" inputmode="numeric" maxlength="19">
                                        <span class="input-group-text"><i
                                                class="bi bi-credit-card text-muted"></i></span>
                                    </div>
                                </div>
                                <div class="row g-3">
                                    <div class="col-6">
                                        <label class="form-label">Expiry (MM/YY)</label>
                                        <input type="text" class="form-control form-control-lg" placeholder="MM/YY"
                                            required id="expiryDate" inputmode="numeric" maxlength="5">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">CVV</label>
                                        <input type="password" class="form-control form-control-lg" placeholder="123"
                                            required id="cvv" inputmode="numeric" maxlength="4">
                                    </div>
                                </div>
                                <hr class="my-4">
                                <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Pay $85.00</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm rounded-4 bg-primary bg-opacity-10 text-primary h-100">
                        <div class="card-body p-4">
                            <h5 class="fw-bold mb-4">Order Summary</h5>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Oil Change</span>
                                <span>$75.00</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Tax (10%)</span>
                                <span>$10.00</span>
                            </div>
                            <hr class="border-primary my-3">
                            <div class="d-flex justify-content-between">
                                <span class="fw-bold fs-5">Total</span>
                                <span class="fw-bold fs-5">$85.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
