<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Add Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="sidebar">
        <div class="brand"><a href="../index.html" style="text-decoration:none;color:inherit;"><i class="bi bi-car-front-fill text-primary"></i> VMS Portal</a></div>
        <div class="sidebar-heading">My Menu</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/client.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li class="active"><a href="add-vehicle.html"><i class="bi bi-plus-circle-fill"></i> Add Vehicle</a></li>
            <li><a href="book-appointment.html"><i class="bi bi-calendar-check"></i> Book Appointment</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <!-- Topbar elements -->
            <h5 class="mb-0 fw-bold d-none d-md-block ms-3">Add New Vehicle</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="col-lg-8 mx-auto">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-car-front text-primary display-4"></i>
                            <h4 class="fw-bold mt-2">Vehicle Details</h4>
                            <p class="text-muted">Enter the details of your vehicle to add it to your garage.</p>
                        </div>
                        <form action="../dashboards/client.html">
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Make</label>
                                    <select class="form-select" required>
                                        <option value="">Select Make</option>
                                        <option>Toyota</option>
                                        <option>Honda</option>
                                        <option>Ford</option>
                                        <option>BMW</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Model</label>
                                    <input type="text" class="form-control" placeholder="e.g. Camry" required>
                                </div>
                            </div>
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Year</label>
                                    <input type="number" class="form-control" min="1990" max="2026" placeholder="2021"
                                        required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">VIN (Optional)</label>
                                    <input type="text" class="form-control" id="vin" placeholder="17-digit VIN" maxlength="17" pattern="[0-9]{17}" title="VIN must be exactly 17 digits">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">License Plate</label>
                                <input type="text" class="form-control" id="plate" placeholder="ABC1234" maxlength="7" pattern="[A-Za-z]{3}[0-9]{4}" title="License Plate must be 3 letters followed by 4 numbers (ABC1234)" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Save Vehicle</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

const vin = document.getElementById("vin");
const plate = document.getElementById("plate");

if(vin){
vin.addEventListener("input", function(){
this.value = this.value.replace(/[^0-9]/g,'').slice(0,17);
});
}

if(plate){
plate.addEventListener("input", function(){
let v = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
let letters = v.slice(0,3).replace(/[^A-Z]/g,'');
let numbers = v.slice(3,7).replace(/[^0-9]/g,'');
this.value = letters + numbers;
});
}

});
</script>

</body>

</html>
