<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VMS - Book Appointment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="vms-app" data-role="client">
    <nav class="sidebar">
        <!-- Sidebar logic -->
        <div class="brand"><a href="../index.html" style="text-decoration:none;color:inherit;"><i class="bi bi-car-front-fill text-primary"></i> VMS Portal</a></div>
        <div class="sidebar-heading">My Menu</div>
        <ul class="sidebar-menu">
            <li><a href="../dashboards/client.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
            <li><a href="add-vehicle.html"><i class="bi bi-plus-circle"></i> Add Vehicle</a></li>
            <li class="active"><a href="book-appointment.html"><i class="bi bi-calendar-check-fill"></i> Book
                    Appointment</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <h5 class="mb-0 fw-bold ms-3">Book Service</h5>
        </header>
        <div class="container p-4 fade-in">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold mb-4">Schedule an Appointment</h4>
                    <form id="appointmentForm">
                        <!-- Vehicle Select -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">1. Select Vehicle</label>
                            <select class="form-select form-select-lg" required>
                                <option>2021 Ford Bronco (XYZ-1234)</option>
                                <option>2018 Honda Civic (ABC-9876)</option>
                            </select>
                        </div>
                        <!-- Service Type -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">2. Select Service Type</label>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <input type="radio" class="btn-check" name="service" id="s1" autocomplete="off"
                                        checked>
                                    <label class="btn btn-outline-primary w-100 p-3 text-start h-100" for="s1">
                                        <i class="bi bi-droplet-fill fs-4 d-block mb-2"></i>
                                        <span class="fw-bold d-block">Oil Change</span>
                                        <small class="text-muted">Standard maintenance</small>
                                    </label>
                                </div>
                                <div class="col-md-4">
                                    <input type="radio" class="btn-check" name="service" id="s2" autocomplete="off">
                                    <label class="btn btn-outline-primary w-100 p-3 text-start h-100" for="s2">
                                        <i class="bi bi-shield-fill-check fs-4 d-block mb-2"></i>
                                        <span class="fw-bold d-block">Full Inspection</span>
                                        <small class="text-muted">Comprehensive checkup</small>
                                    </label>
                                </div>
                                <div class="col-md-4">
                                    <input type="radio" class="btn-check" name="service" id="s3" autocomplete="off">
                                    <label class="btn btn-outline-primary w-100 p-3 text-start h-100" for="s3">
                                        <i class="bi bi-tools fs-4 d-block mb-2"></i>
                                        <span class="fw-bold d-block">Repair/Diagnosis</span>
                                        <small class="text-muted">Specific issue fix</small>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <!-- Date & Time Picker UI -->
                        <div class="row g-4 mb-5">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">3. Select Date</label>
                                <input type="date" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">4. Select Time Slot</label>
                                <select class="form-select form-select-lg" required>
                                    <option>09:00 AM - 10:00 AM</option>
                                    <option>10:00 AM - 11:00 AM</option>
                                    <option>01:00 PM - 02:00 PM</option>
                                    <option>03:00 PM - 04:00 PM</option>
                                </select>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">Proceed to Payment <i
                                    class="bi bi-arrow-right ms-2"></i></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
